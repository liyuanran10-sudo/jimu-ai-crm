<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GPT to Notion Capture Settings</title>
    <style>
      body {
        max-width: 680px;
        margin: 40px auto;
        padding: 0 20px;
        color: #17201b;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      label {
        display: flex;
        flex-direction: column;
        gap: 8px;
        color: #5f6d66;
        font-weight: 650;
      }
      input {
        border: 1px solid #dce3df;
        border-radius: 8px;
        padding: 11px 12px;
        font: inherit;
      }
      button {
        margin-top: 14px;
        border: 1px solid #1d7f5f;
        border-radius: 8px;
        background: #1d7f5f;
        color: #fff;
        padding: 10px 14px;
        font: inherit;
        font-weight: 750;
      }
      p {
        color: #5f6d66;
      }
    </style>
  </head>
  <body>
    <h1>插件设置</h1>
    <p>默认连接本机服务。如果你修改了后端端口，请在这里同步修改。</p>
    <label>
      后端服务地址
      <input id="backendUrl" type="url" value="http://localhost:8787">
    </label>
    <button id="save" type="button">保存设置</button>
    <p id="message"></p>
    <script src="options.js"></script>
  </body>
</html>
